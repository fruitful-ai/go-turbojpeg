name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install libturbojpeg
        run: sudo apt-get update -qq && sudo apt-get install -y -qq libturbojpeg-dev

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          check-latest: true

      - run: go test ./...
